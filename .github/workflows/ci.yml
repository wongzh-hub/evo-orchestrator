name: tests

on:
  push:
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full-loop smoke test (stubbed agent, no network)
        run: python tests/smoke_offline.py
      - name: Seed execution smoke test (all 7 seeds)
        run: python tests/smoke_seeds.py
      - name: Harness contract test (offline, fake client)
        run: python tests/test_harness_contract.py
      - name: Grader wiring test (subprocess isolation)
        run: python tests/test_grader_wiring.py
